<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
  <title>调度中心</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
</head>
<body>
  <div id="dashboard" class="dispatch-dashboard">
    <header id="header">
      <div class="header-left">
        <span class="header-dot"></span>
        <span class="header-city">北海市</span>
        <a class="nav-link" href="/">首页</a>
        <a class="nav-link" href="/assessment">评估中心</a>
        <a class="nav-link" href="/dispatch">调度中心</a>
      </div>
      <div class="header-center">
        <h1 id="dispatchTitle">北海市环保调度中心</h1>
        <div class="subtitle" id="dispatchSubtitle">AI 预警、调度建议与未来 24 小时预测联动看板</div>
      </div>
      <div class="header-right"><span id="dispatchNowTime"></span></div>
    </header>

    <div id="kpiRow">
      <div class="kpi-card">
        <div class="kpi-icon kpi-icon-orange">&#9888;</div>
        <div class="kpi-info">
          <div class="kpi-value orange" id="dispatchWarnings">0</div>
          <div class="kpi-label">AI 预警数<span class="metric-unit"> 条</span></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon kpi-icon-blue">&#9733;</div>
        <div class="kpi-info">
          <div class="kpi-value blue" id="dispatchUrgent">0</div>
          <div class="kpi-label">紧急事项<span class="metric-unit"> 项</span></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon kpi-icon-teal">&#9878;</div>
        <div class="kpi-info">
          <div class="kpi-value green" id="dispatchActions">0</div>
          <div class="kpi-label">待执行建议<span class="metric-unit"> 项</span></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon kpi-icon-green">&#9711;</div>
        <div class="kpi-info">
          <div class="kpi-value" id="dispatchPeak">--</div>
          <div class="kpi-label">峰值时段 / 负荷</div>
        </div>
      </div>
    </div>

    <div id="body">
      <div id="colLeft">
        <div class="card card-full">
          <div class="card-header"><span class="card-title">AI 预警中心</span></div>
          <div class="card-body ai-body" id="dispatchAlerts"></div>
        </div>
        <div class="card card-full">
          <div class="card-header"><span class="card-title">AI 调度建议</span></div>
          <div class="card-body ai-body" id="dispatchRecommendations"></div>
        </div>
        <div class="card card-full">
          <div class="card-header"><span class="card-title">处置摘要</span></div>
          <div class="card-body dispatch-side-body" id="dispatchOverview"></div>
        </div>
      </div>

      <div id="colCenter">
        <div class="card" id="dispatchMapCard">
          <div class="card-header">
            <span class="card-title">站点调度地图</span>
            <span class="map-zoom-hint">辖区分片 + 调度箭头 · 地图区域滚轮缩放</span>
          </div>
          <div class="card-body map-body">
            <div class="map-legend assessment-map-legend">
              <span class="map-legend-item"><i class="map-legend-dot map-legend-dot-online"></i>在线站点</span>
              <span class="map-legend-item"><i class="map-legend-dot map-legend-dot-offline"></i>离线站点</span>
              <span class="map-legend-item"><i class="map-legend-block"></i>辖区分片</span>
            </div>
            <div class="flow-map-wrap dispatch-map-wrap">
              <div id="dispatchMap" class="detail-chart-host"></div>
              <svg id="dispatchMapSvg" class="assessment-flow-svg"></svg>
            </div>
          </div>
        </div>

        <div class="card card-text dispatch-forecast-card">
          <div class="card-header"><span class="card-title">未来 24 小时预测</span></div>
          <div class="card-body detail-page-chart-body">
            <div id="dispatchForecastChart" class="detail-chart-host"></div>
          </div>
        </div>
      </div>

      <div id="colRight">
        <div class="card">
          <div class="card-header"><span class="card-title">容量预警清单</span></div>
          <div class="card-body capacity-body" id="dispatchCapacity"></div>
        </div>
        <div class="card card-full equipment-card">
          <div class="card-header"><span class="card-title">运力效率</span></div>
          <div class="card-body detail-page-chart-body">
            <div id="dispatchTransportChart" class="detail-chart-host"></div>
          </div>
        </div>
        <div class="card card-full">
          <div class="card-header"><span class="card-title">重点站点联动</span></div>
          <div class="card-body dispatch-station-body" id="dispatchStations"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <script src="{{ url_for('static', filename='js/dispatch.js') }}"></script>
</body>
</html>
