<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
  <title>站点评估中心</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
</head>
<body>
  <div id="dashboard" class="assessment-dashboard">
    <header id="header">
      <div class="header-left">
        <span class="header-dot"></span>
        <span class="header-city">北海市</span>
        <a class="nav-link" href="/">首页</a>
        <a class="nav-link" href="/assessment">评估中心</a>
        <a class="nav-link" href="/dispatch">调度中心</a>
      </div>
      <div class="header-center">
        <h1 id="assessmentTitle">站点能力评估</h1>
        <div class="subtitle">产出、回收、能力与辖区覆盖综合评估看板</div>
      </div>
      <div class="header-right"><span id="assessmentNowTime"></span></div>
    </header>

    <div id="kpiRow">
      <div class="kpi-card">
        <div class="kpi-icon kpi-icon-green">&#9733;</div>
        <div class="kpi-info">
          <div class="kpi-value green" id="summaryOutput">--</div>
          <div class="kpi-label">总产出量</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon kpi-icon-teal">&#9851;</div>
        <div class="kpi-info">
          <div class="kpi-value green" id="summaryRecycling">--</div>
          <div class="kpi-label">总回收量</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon kpi-icon-blue">&#9878;</div>
        <div class="kpi-info">
          <div class="kpi-value blue" id="summaryCapacity">--</div>
          <div class="kpi-label">平均处理能力</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon kpi-icon-orange">&#9733;</div>
        <div class="kpi-info">
          <div class="kpi-value orange kpi-value-text" id="summaryTopStation">--</div>
          <div class="kpi-label">综合最佳站点</div>
        </div>
      </div>
    </div>

    <div id="body">
      <div id="colLeft">
        <div class="card assessment-ranking-card">
          <div class="card-header"><span class="card-title">站点评分排序</span></div>
          <div class="card-body assessment-table-body" id="rankingTable"></div>
        </div>

        <div class="card card-full assessment-horizontal-card">
          <div class="card-header"><span class="card-title">处理能力水平条形图</span></div>
          <div class="card-body detail-page-chart-body">
            <div id="assessmentHorizontalChart" class="detail-chart-host"></div>
          </div>
        </div>

        <div class="card card-full assessment-rate-card">
          <div class="card-header"><span class="card-title">月度资源化利用率</span></div>
          <div class="card-body detail-page-chart-body">
            <div id="assessmentRateChart" class="detail-chart-host"></div>
          </div>
        </div>
      </div>

      <div id="colCenter">
        <div class="card" id="assessmentMapCard">
          <div class="card-header">
            <span class="card-title">辖区站点评估地图</span>
            <span class="map-zoom-hint">北海辖区分片 + 站点覆盖 · 地图区域滚轮缩放</span>
          </div>
          <div class="card-body map-body">
            <div class="map-legend assessment-map-legend">
              <span class="map-legend-item"><i class="map-legend-dot map-legend-dot-online"></i>在线站点</span>
              <span class="map-legend-item"><i class="map-legend-dot map-legend-dot-offline"></i>离线站点</span>
              <span class="map-legend-item"><i class="map-legend-block"></i>辖区分片</span>
            </div>
            <div class="flow-map-wrap assessment-map-wrap">
              <div id="assessmentFlowMap" class="detail-chart-host"></div>
            </div>
          </div>
        </div>

        <div class="card card-text assessment-trend-card">
          <div class="card-header"><span class="card-title">近10日收集与回收趋势</span></div>
          <div class="card-body detail-page-chart-body">
            <div id="assessmentTrendChart" class="detail-chart-host"></div>
          </div>
        </div>
      </div>

      <div id="colRight">
        <div class="card card-full side-analysis-card">
          <div class="card-header"><span class="card-title">综合评分垂直柱状图</span></div>
          <div class="card-body detail-page-chart-body">
            <div id="assessmentVerticalChart" class="detail-chart-host"></div>
          </div>
        </div>

        <div class="card card-full assessment-heatmap-card">
          <div class="card-header"><span class="card-title">站点评估热力图</span></div>
          <div class="card-body detail-page-chart-body">
            <div id="assessmentHeatmapChart" class="detail-chart-host"></div>
          </div>
        </div>

        <div class="card card-full assessment-tree-card">
          <div class="card-header"><span class="card-title">区域能力概览</span></div>
          <div class="card-body detail-page-chart-body">
            <div id="assessmentTreeChart" class="detail-chart-host"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <script src="{{ url_for('static', filename='js/assessment.js') }}"></script>
</body>
</html>
